<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benching PIR — DB Configs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    #configs-table tbody tr:nth-child(even) { background: transparent; }
    #configs-table .scheme-start td { border-top: 2px solid var(--border); }
    #configs-table thead th { text-align: center; cursor: default; }
    #configs-table thead th:hover { background: transparent; }
    #configs-table tbody tr:hover { background: transparent; }
    #configs-table tbody td { text-align: center; white-space: normal; }
    .type-legend { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; font-size: 12px; }
    .type-legend span { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .type-legend strong { color: var(--text); }
    .type-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .type-dot.benchmarked { background: #2da44e; }
    .type-dot.analytical { background: #bf8700; }
    .type-dot.estimated { background: #bbb; }
    .footnotes { margin-top: 32px; font-size: 13px; color: var(--text-muted); line-height: 1.7; }
    .footnotes p { margin-bottom: 12px; }
    .footnotes sup { color: var(--link); font-weight: 600; }
    .footnotes code { font-size: 12px; background: var(--bg-alt); padding: 2px 5px; border-radius: 3px; }
    @media (max-width: 900px) {
      .type-legend { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- Hamburger (mobile) -->
<button class="hamburger" aria-label="Menu">&#9776;</button>
<div class="sidebar-overlay"></div>

<!-- Sidebar -->
<aside class="sidebar">
  <a href="../" class="sidebar-title">Benching PIR</a>
  <nav id="sidebar-nav"></nav>
</aside>

<!-- Main Content -->
<main class="content">
<section id="db-configs">
  <h2><a href="#db-configs">DB Configs</a></h2>
  <div class="type-legend">
    <span><span class="type-dot benchmarked"></span> <strong>Benchmarked</strong> — by authors based on implementations</span>
    <span><span class="type-dot analytical"></span> <strong>Analytical</strong> — derived via cost model, no impl</span>
    <span><span class="type-dot estimated"></span> <strong>Estimated</strong> — chosen by notes author for asymptotic estimates</span>
  </div>

  <div class="table-wrap">
    <table id="configs-table">
      <thead>
        <tr><th>#</th><th>Scheme</th><th>N (entries)</th><th>Entry Size</th><th>DB Size</th><th>Type</th><th>Source</th></tr>
      </thead>
      <tbody id="configs-body">
      </tbody>
    </table>
  </div>

  <div class="footnotes" id="footnotes">
  </div>

</section>
</main>

<script src="../nav.js"></script>
<script src="../script.js"></script>
<script src="db_config.js"></script>
</body>
</html>
